__include__: [
  # '../../dataset/custom_detection.yml',
  '../../dataset/aitod_detection.yml',
  '../../runtime.yml',
  '../include/dataloader.yml',
  '../include/optimizer.yml',
  '../include/dfine_hgnetv2.yml',
  '../include/dfine_s_aitod_baseline.yml',
]


output_dir: ./output/D-Fine_S_filter_trust_weight

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox']
  allowed_area_labels: ['tiny', 'small']
  exclude_images_without_annotations: True
  reported_area_labels: ['tiny', 'small']


DFINE:
  backbone: HGNetv2

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

DFINETransformer:
  num_layers: 3  # 4 5 6
  eval_idx: -1  # -2 -3 -4
  trust_enabled: True
  trust_topk: 4
  trust_hidden_dim: 64

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0002
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0002
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.0001


# Increase to search for the optimal ema
epochs: 300
train_dataloader:
  total_batch_size: 8
  dataset:
    allowed_area_labels: ['tiny', 'small']
    exclude_images_without_valid_annotations: True
    transforms:
      policy:
        epoch: 272
  collate_fn:
    stop_epoch: 272
    ema_restart_decay: 0.9999
    base_size_repeat: 20

val_dataloader:
  total_batch_size: 8
  dataset:
    allowed_area_labels: ['tiny', 'small']
    exclude_images_without_valid_annotations: True


DFINECriterion:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5, loss_trust: 1.0}
  losses: ['vfl', 'boxes', 'local', 'trust']
  alpha: 0.75
  gamma: 2.0
  reg_max: 32
  trust_alpha: 0.5
  trust_eps: 1.0e-6
