__include__: [
  './dfine_hgnetv2_s_aitod.yml',
]

# Full TrustKD-style run: trust weighting + scale-aware matched KD + layer-mixture teacher.
output_dir: ./output/D-Fine_S_filter_trust_scaleaware_matchedkd_full
exp_name: D-dfine_s_trust_scaleaware_matchedkd_full

DFINETransformer:
  trust_enabled: True
  trust_topk: 4
  trust_hidden_dim: 64
  teacher_enabled: True
  teacher_mode: entropy_drift_mixture
  teacher_layer_ids: [1, 2]
  teacher_exclude_final: False
  teacher_tau_entropy: 1.0
  teacher_tau_drift: 1.0
  teacher_tau_conf: 0.0
  teacher_detach: True
  teacher_use_prob_mixture: True

DFINECriterion:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5, loss_trust: 1.0}
  losses: ['vfl', 'boxes', 'local', 'trust']
  alpha: 0.75
  gamma: 2.0
  reg_max: 32
  trust_alpha: 0.5
  trust_eps: 1.0e-6
  trust_scale_weight_very_tiny: 2.5
  trust_scale_weight_tiny: 1.75
  trust_scale_weight_small: 1.25
  trust_unmatched_kd_weight: 0.0
